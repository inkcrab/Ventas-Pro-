<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caja Feria - Historial Identificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
        }

        .active-tab-bijou { border-bottom: 4px solid #db2777; color: #db2777; }
        .active-tab-3d { border-bottom: 4px solid #4f46e5; color: #4f46e5; }

        .product-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 140px;
            text-align: left;
            border: 1px solid #f1f5f9;
        }

        .manage-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f1f5f9;
            margin-bottom: 0.75rem;
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-24">

    <div id="app" class="max-w-md mx-auto px-4">
        <!-- Navegación -->
        <nav class="flex bg-white border-b sticky top-0 z-40 -mx-4 mb-6 shadow-sm no-print">
            <button onclick="switchBooth('bijou')" id="tab-bijou" class="flex-1 py-4 text-[10px] font-black uppercase active-tab-bijou tracking-tight">✨ A TU ESTILO.</button>
            <button onclick="switchBooth('okidokie')" id="tab-okidokie" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight">🤖 OKIEDOKIE</button>
        </nav>

        <!-- Totales -->
        <div class="grid grid-cols-2 gap-4 mb-6 no-print">
            <div class="bg-[#10b981] p-6 rounded-[2rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">Efectivo Hoy</p>
                <p id="total-cash" class="text-2xl font-extrabold">$0</p>
            </div>
            <div class="bg-[#0ea5e9] p-6 rounded-[2rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">M. Pago Hoy</p>
                <p id="total-mp" class="text-2xl font-extrabold">$0</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="mb-6 no-print">
            <input type="text" id="search-input" oninput="render()" placeholder="🔍 Buscar producto..." 
                class="w-full p-5 bg-white border border-slate-100 rounded-[1.5rem] font-bold shadow-sm outline-none text-sm">
        </div>

        <!-- Productos -->
        <div id="products-grid" class="grid grid-cols-2 gap-4 mb-8"></div>

        <!-- Panel de Control -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50 no-print space-y-4">
            <button onclick="generateReport()" class="w-full py-5 bg-[#1e293b] text-white font-black rounded-2xl shadow-lg uppercase text-xs">📄 Ver Ventas de Hoy</button>
            
            <div class="grid grid-cols-3 gap-2">
                <button onclick="openConfig()" class="py-4 bg-[#f1f5f9] text-[#475569] font-black rounded-xl uppercase text-[9px]">📦 Stock</button>
                <button onclick="openNotes()" class="py-4 bg-[#fff7ed] text-[#9a3412] font-black rounded-xl uppercase text-[9px]">📝 Notas</button>
                <button onclick="openExpenses()" class="py-4 bg-[#fef2f2] text-[#991b1b] font-black rounded-xl uppercase text-[9px]">💸 Gastos</button>
            </div>

            <button onclick="openHistory()" class="w-full py-4 bg-slate-100 text-slate-600 font-black rounded-2xl uppercase text-[10px] tracking-widest">📂 Historial de Días</button>

            <button onclick="handleCloseDay()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl shadow-lg uppercase text-xs tracking-wider">
                🔐 CERRAR DÍA Y GUARDAR REGISTRO
            </button>
        </div>
    </div>

    <!-- MODALES -->

    <!-- Gestión Stock -->
    <div id="config-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400">📦 Gestión Stock</h2><button onclick="closeModal('config-modal')" class="text-2xl">✕</button></div>
            <div class="bg-slate-50 p-6 rounded-[2rem] mb-8 border border-slate-100">
                <input id="in-name" type="text" placeholder="Nombre del producto" class="w-full p-4 rounded-xl mb-3 font-bold text-sm bg-white outline-none">
                <input id="in-price" type="number" placeholder="Precio ($)" class="w-full p-4 rounded-xl mb-6 font-bold text-sm bg-white outline-none">
                <button onclick="saveProduct()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl uppercase text-xs">Añadir Producto</button>
            </div>
            <div id="edit-list" class="space-y-1"></div>
        </div>
    </div>

    <!-- Notas -->
    <div id="notes-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-orange-400">📝 Notas del Día</h2><button onclick="closeModal('notes-modal')" class="text-2xl">✕</button></div>
            <textarea id="notes-area" oninput="saveNotes()" class="w-full h-[60vh] p-8 bg-orange-50 rounded-[3rem] font-bold text-slate-700 outline-none border-none resize-none placeholder-orange-200" placeholder="Escribe recordatorios..."></textarea>
        </div>
    </div>

    <!-- Gastos -->
    <div id="expenses-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-red-400">💸 Gastos</h2><button onclick="closeModal('expenses-modal')" class="text-2xl">✕</button></div>
            <div class="bg-red-50 p-6 rounded-[2rem] mb-8 border border-red-100">
                <input id="exp-name" type="text" placeholder="Concepto de gasto" class="w-full p-4 rounded-xl mb-3 font-bold text-sm bg-white outline-none">
                <input id="exp-price" type="number" placeholder="Monto ($)" class="w-full p-4 rounded-xl mb-6 font-bold text-sm bg-white outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveExpense('cash')" class="py-4 bg-[#10b981] text-white font-black rounded-xl uppercase text-[9px]">Efectivo</button>
                    <button onclick="saveExpense('mp')" class="py-4 bg-[#0ea5e9] text-white font-black rounded-xl uppercase text-[9px]">M. Pago</button>
                </div>
            </div>
            <div id="expenses-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- Venta Confirmación -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl">
            <h3 id="confirm-item-name" class="text-lg font-black text-slate-800 mb-4 uppercase text-center">Producto</h3>
            <div class="flex items-center justify-center gap-8 mb-8">
                <button onclick="updateQty(-1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">−</button>
                <span id="confirm-qty" class="text-4xl font-black text-slate-900">1</span>
                <button onclick="updateQty(1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">+</button>
            </div>
            <div class="bg-indigo-50 rounded-[2rem] p-6 mb-8 text-center border border-indigo-100">
                <p id="confirm-total" class="text-4xl font-black text-indigo-600">$0</p>
            </div>
            <div class="grid gap-3">
                <button onclick="confirmSale('cash')" class="w-full py-5 bg-[#10b981] text-white font-black rounded-2xl uppercase text-xs">Efectivo</button>
                <button onclick="confirmSale('mp')" class="w-full py-5 bg-[#0ea5e9] text-white font-black rounded-2xl uppercase text-xs">Mercado Pago</button>
                <button onclick="closeModal('confirm-modal')" class="py-2 text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Historial -->
    <div id="history-modal" class="hidden fixed inset-0 bg-white z-[200] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400">📂 Historial de Cierres</h2><button onclick="closeModal('history-modal')" class="text-2xl">✕</button></div>
            <div id="history-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Reporte Detalle -->
    <div id="report-modal" class="hidden fixed inset-0 bg-white z-[250] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between mb-8 no-print items-center">
                <button onclick="closeModal('report-modal')" class="font-black text-slate-400 text-[10px] uppercase">✕ Cerrar</button>
                <button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Imprimir</button>
            </div>
            <div id="report-content"></div>
        </div>
    </div>

    <script>
        let currentBooth = 'bijou';
        let pendingItem = null;
        let currentQty = 1;

        const getSafe = (k) => {
            try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e) { return []; }
        };

        function switchBooth(b) {
            currentBooth = b;
            document.getElementById('tab-bijou').className = b === 'bijou' ? 'flex-1 py-4 text-[10px] font-black uppercase active-tab-bijou tracking-tight' : 'flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight';
            document.getElementById('tab-okidokie').className = b === 'okidokie' ? 'flex-1 py-4 text-[10px] font-black uppercase active-tab-3d tracking-tight' : 'flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight';
            render();
        }

        function render() {
            let cash = 0, mp = 0;
            ['bijou', 'okidokie'].forEach(p => {
                getSafe(p + '_sales').forEach(s => {
                    if(s.method === 'cash') cash += (s.totalPrice || 0);
                    else mp += (s.totalPrice || 0);
                });
            });
            getSafe('global_expenses').forEach(g => {
                if(g.method === 'cash') cash -= (g.amount || 0);
                else mp -= (g.amount || 0);
            });

            document.getElementById('total-cash').innerText = "$" + cash.toLocaleString();
            document.getElementById('total-mp').innerText = "$" + mp.toLocaleString();

            const search = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('products-grid').innerHTML = getSafe(currentBooth + '_products')
                .filter(p => p.name.toLowerCase().includes(search))
                .map(p => `
                    <button onclick="askConfirmation(${p.id})" class="product-card">
                        <h4 class="font-black text-[10px] uppercase text-slate-700 leading-tight">${p.name}</h4>
                        <p class="text-[#4f46e5] font-black text-sm">$${p.price.toLocaleString()}</p>
                    </button>
                `).join('');
        }

        function askConfirmation(id) {
            pendingItem = getSafe(currentBooth + '_products').find(p => p.id === id);
            currentQty = 1; updateQtyDisplay();
            document.getElementById('confirm-item-name').innerText = pendingItem.name;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function updateQty(v) { currentQty = Math.max(1, currentQty + v); updateQtyDisplay(); }
        function updateQtyDisplay() {
            document.getElementById('confirm-qty').innerText = currentQty;
            document.getElementById('confirm-total').innerText = "$" + (pendingItem.price * currentQty).toLocaleString();
        }
        function confirmSale(method) {
            const sales = getSafe(currentBooth + '_sales');
            sales.push({ id: Date.now(), name: pendingItem.name, qty: currentQty, totalPrice: pendingItem.price * currentQty, method, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            localStorage.setItem(currentBooth + '_sales', JSON.stringify(sales));
            closeModal('confirm-modal'); render();
        }

        function openConfig() { document.getElementById('config-modal').classList.remove('hidden'); renderEditList(); }
        function saveProduct() {
            const n = document.getElementById('in-name').value, p = parseInt(document.getElementById('in-price').value);
            if(!n || !p) return;
            const items = getSafe(currentBooth + '_products');
            items.push({ id: Date.now(), name: n, price: p });
            localStorage.setItem(currentBooth + '_products', JSON.stringify(items));
            document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
            renderEditList(); render();
        }
        function renderEditList() {
            document.getElementById('edit-list').innerHTML = getSafe(currentBooth + '_products').map(p => `
                <div class="manage-card">
                    <div class="text-[10px] font-black uppercase"><p>${p.name}</p><p class="text-indigo-500">$${p.price}</p></div>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400 font-black text-[9px] bg-red-50 px-3 py-2 rounded-xl">Eliminar</button>
                </div>
            `).join('') || '<p class="text-center py-20 text-slate-300 font-black uppercase text-[10px]">Sin productos</p>';
        }
        function deleteProduct(id) {
            const items = getSafe(currentBooth + '_products').filter(i => i.id !== id);
            localStorage.setItem(currentBooth + '_products', JSON.stringify(items));
            renderEditList(); render();
        }

        function openExpenses() { document.getElementById('expenses-modal').classList.remove('hidden'); renderExp(); }
        function saveExpense(method) {
            const n = document.getElementById('exp-name').value, p = parseInt(document.getElementById('exp-price').value);
            if(!n || !p) return;
            const exps = getSafe('global_expenses');
            exps.push({ id: Date.now(), name: n, amount: p, method });
            localStorage.setItem('global_expenses', JSON.stringify(exps));
            document.getElementById('exp-name').value = ""; document.getElementById('exp-price').value = "";
            renderExp(); render();
        }
        function renderExp() {
            document.getElementById('expenses-list').innerHTML = getSafe('global_expenses').map(e => `
                <div class="flex justify-between p-4 bg-red-50 rounded-2xl text-[10px] font-bold text-red-800 uppercase">
                    <span>${e.name} (${e.method})</span><span>-$${e.amount}</span>
                </div>
            `).join('');
        }

        function openNotes() {
            document.getElementById('notes-area').value = localStorage.getItem('feria_notes') || "";
            document.getElementById('notes-modal').classList.remove('hidden');
        }
        function saveNotes() {
            localStorage.setItem('feria_notes', document.getElementById('notes-area').value);
        }

        // --- LÓGICA DE HISTORIAL CORREGIDA ---
        function openHistory() {
            const history = getSafe('feria_history');
            document.getElementById('history-list').innerHTML = history.map(h => {
                // Determinar qué puesto se cerró
                let title = "CIERRE MIXTO";
                let borderColor = "border-slate-200";
                let bgColor = "bg-white";

                if (h.bijou && h.bijou.length > 0 && (!h.oki || h.oki.length === 0)) {
                    title = "CIERRE: BIJOU ✨";
                    borderColor = "border-pink-200";
                } else if (h.oki && h.oki.length > 0 && (!h.bijou || h.bijou.length === 0)) {
                    title = "CIERRE: OKIEDOKIE 🤖";
                    borderColor = "border-blue-200";
                }

                return `
                <div class="bg-white border-l-8 ${borderColor} p-6 rounded-2xl shadow-sm flex flex-col gap-3">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-slate-800 uppercase tracking-widest">${title}</p>
                            <p class="text-[9px] font-bold text-slate-400 mt-0.5">${h.fecha} a las ${h.hora}</p>
                        </div>
                        <button onclick='viewHistoryDetail(${JSON.stringify(h)})' class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase">Detalle</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 border-t pt-3 border-slate-50">
                        <div class="text-[10px] font-black text-emerald-600 uppercase">Efectivo: ${h.totalCash}</div>
                        <div class="text-[10px] font-black text-sky-600 uppercase">M. Pago: ${h.totalMp}</div>
                    </div>
                </div>
                `;
            }).join('') || '<p class="text-center py-20 text-slate-300 font-black uppercase text-[10px]">No hay cierres guardados</p>';
            document.getElementById('history-modal').classList.remove('hidden');
        }

        function handleCloseDay() {
            const b = getSafe('bijou_sales'), o = getSafe('okidokie_sales'), g = getSafe('global_expenses');
            if (b.length === 0 && o.length === 0 && g.length === 0) return alert("Nada que cerrar hoy.");
            
            if (confirm("¿Cerrar caja y guardar este registro?")) {
                const closure = {
                    id: Date.now(), fecha: new Date().toLocaleDateString(),
                    hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    bijou: b, oki: o, expenses: g,
                    totalCash: document.getElementById('total-cash').innerText,
                    totalMp: document.getElementById('total-mp').innerText
                };
                const history = getSafe('feria_history');
                history.unshift(closure);
                localStorage.setItem('feria_history', JSON.stringify(history));
                
                // Reset
                localStorage.setItem('bijou_sales', '[]'); localStorage.setItem('okidokie_sales', '[]'); localStorage.setItem('global_expenses', '[]');
                localStorage.setItem('feria_notes', ""); 
                render(); alert("Registro guardado con éxito.");
            }
        }

        function viewHistoryDetail(h) {
            let html = `
                <div class="text-center mb-8"><h2 class="font-black text-xl uppercase">${h.fecha}</h2><p class="text-[9px] text-slate-400 uppercase font-bold">Cierre efectuado a las ${h.hora}</p></div>
                <div class="space-y-6">
                    <div><p class="text-[9px] font-black text-pink-500 border-b pb-1 mb-2 uppercase tracking-tighter">✨ VENTAS A TU ESTILO</p>
                    ${h.bijou.map(s => `<div class="flex justify-between text-[11px] py-1 border-b border-slate-50 last:border-0"><span>${s.hora} - ${s.name} x${s.qty}</span><span class="font-black">$${s.totalPrice.toLocaleString()}</span></div>`).join('') || '<p class="text-[10px] italic text-slate-300">Sin ventas registradas</p>'}</div>
                    
                    <div><p class="text-[9px] font-black text-indigo-500 border-b pb-1 mb-2 uppercase tracking-tighter">🤖 VENTAS OKIEDOKIE</p>
                    ${h.oki.map(s => `<div class="flex justify-between text-[11px] py-1 border-b border-slate-50 last:border-0"><span>${s.hora} - ${s.name} x${s.qty}</span><span class="font-black">$${s.totalPrice.toLocaleString()}</span></div>`).join('') || '<p class="text-[10px] italic text-slate-300">Sin ventas registradas</p>'}</div>
                    
                    <div><p class="text-[9px] font-black text-red-400 border-b pb-1 mb-2 uppercase tracking-tighter">💸 GASTOS</p>
                    ${h.expenses.map(e => `<div class="flex justify-between text-[11px] py-1 text-red-500 italic"><span>${e.name} (${e.method})</span><span class="font-bold">-$${e.amount}</span></div>`).join('') || '<p class="text-[10px] italic text-slate-300">Sin gastos</p>'}</div>
                </div>
                <div class="mt-8 p-6 bg-slate-900 rounded-[2.5rem] text-white text-[11px] font-black uppercase tracking-tight shadow-xl">
                    <p class="flex justify-between mb-2"><span>Efectivo Total:</span> <span class="text-emerald-400">${h.totalCash}</span></p>
                    <p class="flex justify-between"><span>M. Pago Total:</span> <span class="text-sky-400">${h.totalMp}</span></p>
                </div>
            `;
            document.getElementById('report-content').innerHTML = html;
            document.getElementById('report-modal').classList.remove('hidden');
        }

        function generateReport() {
            const h = { fecha: "Hoy (En curso)", hora: "En proceso", bijou: getSafe('bijou_sales'), oki: getSafe('okidokie_sales'), expenses: getSafe('global_expenses'), totalCash: document.getElementById('total-cash').innerText, totalMp: document.getElementById('total-mp').innerText };
            viewHistoryDetail(h);
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        window.onload = render;
    </script>
</body>
</html>

```
