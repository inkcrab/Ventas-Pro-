<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caja Feria - Gestión Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .active-tab-bijou { 
            border-bottom: 4px solid #db2777; 
            color: #db2777; 
        }

        .active-tab-3d { 
            border-bottom: 4px solid #4f46e5; 
            color: #4f46e5; 
        }

        .product-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 140px;
            text-align: left;
            transition: transform 0.1s;
        }

        .product-card:active {
            transform: scale(0.95);
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-20">

    <div id="app" class="max-w-md mx-auto px-4">
        <!-- Navegación idéntica a la captura -->
        <nav class="flex bg-white border-b sticky top-0 z-40 -mx-4 mb-6 shadow-sm no-print">
            <button onclick="switchBooth('bijou')" id="tab-bijou" class="flex-1 py-4 text-[10px] font-black uppercase active-tab-bijou tracking-tight">✨ A TU ESTILO.</button>
            <button onclick="switchBooth('okidokie')" id="tab-okidokie" class="flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight">🤖 OKIEDOKIE</button>
        </nav>

        <!-- Bloques de Totales con el diseño de tus fotos -->
        <div class="grid grid-cols-2 gap-4 mb-6 no-print">
            <div class="bg-[#10b981] p-6 rounded-[1.5rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">Efectivo Real</p>
                <p id="total-cash" class="text-2xl font-extrabold">$0</p>
            </div>
            <div class="bg-[#0ea5e9] p-6 rounded-[1.5rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">M. Pago Real</p>
                <p id="total-mp" class="text-2xl font-extrabold">$0</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="mb-6 no-print">
            <input type="text" id="search-input" oninput="render()" placeholder="🔍 Buscar producto..." 
                class="w-full p-5 bg-white border border-slate-100 rounded-[1.5rem] font-bold shadow-sm outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm">
        </div>

        <!-- Lista de Productos (Tarjetas blancas) -->
        <div id="products-grid" class="grid grid-cols-2 gap-4 mb-8"></div>

        <!-- Panel Inferior Redondeado -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50 no-print space-y-4">
            <button onclick="generateReport()" class="w-full py-5 bg-[#1e293b] text-white font-black rounded-2xl shadow-lg uppercase text-xs tracking-wide">📄 Reporte con Horarios</button>
            
            <div class="grid grid-cols-3 gap-2">
                <button onclick="openConfig()" class="py-4 bg-[#f1f5f9] text-[#475569] font-black rounded-xl uppercase text-[9px]">📦 Stock</button>
                <button onclick="openNotes()" class="py-4 bg-[#fff7ed] text-[#9a3412] font-black rounded-xl uppercase text-[9px]">📝 Notas</button>
                <button onclick="openExpenses()" class="py-4 bg-[#fef2f2] text-[#991b1b] font-black rounded-xl uppercase text-[9px]">💸 Gastos</button>
            </div>

            <button onclick="forceReset()" class="w-full py-3 bg-[#fff1f2] text-[#e11d48] font-black rounded-xl uppercase text-[10px] opacity-80">⚠️ Cierre de Caja</button>
        </div>
    </div>

    <!-- Modales -->
    <!-- [Mismos flujos pero con los cálculos limpios] -->

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl animate-in slide-in-from-bottom duration-300">
            <h3 id="confirm-item-name" class="text-lg font-black text-slate-800 mb-6 uppercase text-center">Producto</h3>
            <div class="flex items-center justify-center gap-8 mb-8">
                <button onclick="updateQty(-1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">−</button>
                <span id="confirm-qty" class="text-4xl font-black text-slate-900">1</span>
                <button onclick="updateQty(1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">+</button>
            </div>
            <div class="bg-indigo-50 rounded-[2rem] p-6 mb-8 text-center border border-indigo-100">
                <p id="confirm-total" class="text-4xl font-black text-indigo-600">$0</p>
            </div>
            <div class="grid gap-3">
                <button onclick="confirmSale('cash')" class="w-full py-5 bg-[#10b981] text-white font-black rounded-2xl uppercase text-xs">Venta Efectivo</button>
                <button onclick="confirmSale('mp')" class="w-full py-5 bg-[#0ea5e9] text-white font-black rounded-2xl uppercase text-xs">Venta Mercado Pago</button>
                <button onclick="closeModal('confirm-modal')" class="py-2 text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Gestión de Stock -->
    <div id="config-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-sm tracking-widest text-slate-400">📦 Gestión de Stock</h2>
                <button onclick="closeModal('config-modal')" class="text-2xl text-slate-300">✕</button>
            </div>
            <div class="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 mb-8">
                <input id="in-name" type="text" placeholder="Nombre" class="w-full p-4 rounded-xl border-none mb-3 font-bold text-sm bg-white shadow-sm">
                <input id="in-price" type="number" placeholder="Precio ($)" class="w-full p-4 rounded-xl border-none mb-4 font-bold text-sm bg-white shadow-sm">
                <button onclick="saveProduct()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl uppercase text-xs">Añadir al Puesto Actual</button>
            </div>
            <div id="edit-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Gastos -->
    <div id="expenses-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-sm tracking-widest text-red-400">💸 Registrar Gastos</h2>
                <button onclick="closeModal('expenses-modal')" class="text-2xl text-slate-300">✕</button>
            </div>
            <div class="bg-red-50 p-6 rounded-[2rem] border border-red-100 mb-8">
                <input id="exp-name" type="text" placeholder="Ej: Almuerzo" class="w-full p-4 rounded-xl border-none mb-3 font-bold text-sm bg-white shadow-sm">
                <input id="exp-price" type="number" placeholder="Importe ($)" class="w-full p-4 rounded-xl border-none mb-4 font-bold text-sm bg-white shadow-sm">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveExpense('cash')" class="py-4 bg-[#10b981] text-white font-black rounded-xl uppercase text-[10px]">Pagó Efectivo</button>
                    <button onclick="saveExpense('mp')" class="py-4 bg-[#0ea5e9] text-white font-black rounded-xl uppercase text-[10px]">Pagó M. Pago</button>
                </div>
            </div>
            <div id="expenses-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- Reporte -->
    <div id="report-modal" class="hidden fixed inset-0 bg-white z-[200] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between mb-8 no-print items-center">
                <button onclick="closeModal('report-modal')" class="font-black text-slate-300 text-[10px] uppercase">✕ Cerrar</button>
                <button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Imprimir</button>
            </div>
            <div id="report-content"></div>
        </div>
    </div>

    <script>
        let currentBooth = 'bijou';
        let pendingItem = null;
        let currentQty = 1;

        // Limpieza profunda preventiva si se detecta error en la suma (Opcional)
        function checkIntegrity() {
            const data = localStorage.getItem('bijou_sales');
            if (data && data.includes('NaN')) localStorage.clear();
        }

        const getSafe = (k) => {
            try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e) { return []; }
        };

        function switchBooth(b) {
            currentBooth = b;
            document.getElementById('tab-bijou').className = b === 'bijou' ? 'flex-1 py-4 text-[10px] font-black uppercase active-tab-bijou tracking-tight' : 'flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight';
            document.getElementById('tab-okidokie').className = b === 'okidokie' ? 'flex-1 py-4 text-[10px] font-black uppercase active-tab-3d tracking-tight' : 'flex-1 py-4 text-[10px] font-black uppercase text-slate-400 tracking-tight';
            render();
        }

        function render() {
            // CÁLCULO DE CAJA GLOBAL (Mismo que antes pero limpio)
            let cashTotal = 0, mpTotal = 0;
            
            // Ventas
            ['bijou', 'okidokie'].forEach(puesto => {
                getSafe(puesto + '_sales').forEach(v => {
                    if(v.method === 'cash') cashTotal += (v.totalPrice || 0);
                    else mpTotal += (v.totalPrice || 0);
                });
            });

            // Gastos
            getSafe('global_expenses').forEach(g => {
                if(g.method === 'cash') cashTotal -= (g.amount || 0);
                else mpTotal -= (g.amount || 0);
            });

            document.getElementById('total-cash').innerText = "$" + cashTotal.toLocaleString();
            document.getElementById('total-mp').innerText = "$" + mpTotal.toLocaleString();

            // Renderizado de productos (Estética original)
            const search = document.getElementById('search-input').value.toLowerCase();
            const grid = document.getElementById('products-grid');
            
            grid.innerHTML = getSafe(currentBooth + '_products').filter(p => p.name.toLowerCase().includes(search)).map(p => `
                <button onclick="askConfirmation(${p.id})" class="product-card">
                    <h4 class="font-black text-[10px] uppercase leading-tight text-slate-700">${p.name}</h4>
                    <p class="text-[#4f46e5] font-black text-xs">$${p.price.toLocaleString()}</p>
                </button>
            `).join('');
        }

        // Venta
        function askConfirmation(id) {
            pendingItem = getSafe(currentBooth + '_products').find(p => p.id === id);
            currentQty = 1;
            updateQtyDisplay();
            document.getElementById('confirm-item-name').innerText = pendingItem.name;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function updateQty(v) { currentQty = Math.max(1, currentQty + v); updateQtyDisplay(); }
        function updateQtyDisplay() {
            document.getElementById('confirm-qty').innerText = currentQty;
            document.getElementById('confirm-total').innerText = "$" + (pendingItem.price * currentQty).toLocaleString();
        }

        function confirmSale(method) {
            const key = currentBooth + '_sales';
            const sales = getSafe(key);
            sales.push({
                id: Date.now(),
                name: pendingItem.name,
                qty: currentQty,
                totalPrice: pendingItem.price * currentQty,
                method,
                hora: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem(key, JSON.stringify(sales));
            closeModal('confirm-modal');
            render();
        }

        // Reporte
        function generateReport() {
            let html = `<h2 class="text-center font-black uppercase text-xl mb-8">Balance Final</h2>`;
            let balanceCash = 0, balanceMp = 0;

            ['bijou', 'okidokie'].forEach(p => {
                const sales = getSafe(p + '_sales');
                if(sales.length > 0) {
                    html += `<div class="mb-6"><h3 class="text-[9px] font-black text-slate-400 uppercase border-b pb-1 mb-2">${p === 'bijou' ? 'A Tu Estilo' : 'Okiedokie'}</h3>`;
                    sales.forEach(s => {
                        if(s.method === 'cash') balanceCash += s.totalPrice; else balanceMp += s.totalPrice;
                        html += `<div class="flex justify-between py-1 text-[10px] font-bold"><span>${s.hora} - ${s.name} x${s.qty}</span><span>$${s.totalPrice}</span></div>`;
                    });
                    html += `</div>`;
                }
            });

            const exps = getSafe('global_expenses');
            if(exps.length > 0) {
                html += `<div class="mb-6 text-red-500"><h3 class="text-[9px] font-black uppercase border-b pb-1 mb-2">Gastos Registrados</h3>`;
                exps.forEach(e => {
                    if(e.method === 'cash') balanceCash -= e.amount; else balanceMp -= e.amount;
                    html += `<div class="flex justify-between py-1 text-[10px] font-bold italic"><span>${e.name} (${e.method})</span><span>-$${e.amount}</span></div>`;
                });
                html += `</div>`;
            }

            html += `<div class="mt-10 p-6 bg-slate-900 rounded-[2rem] text-white">
                <p class="flex justify-between text-xs mb-2"><span>Total Efectivo:</span> <b>$${balanceCash.toLocaleString()}</b></p>
                <p class="flex justify-between text-xs"><span>Total M. Pago:</span> <b>$${balanceMp.toLocaleString()}</b></p>
            </div>`;

            document.getElementById('report-content').innerHTML = html;
            document.getElementById('report-modal').classList.remove('hidden');
        }

        // Stock
        function openConfig() { document.getElementById('config-modal').classList.remove('hidden'); renderEditList(); }
        function saveProduct() {
            const n = document.getElementById('in-name').value;
            const p = parseInt(document.getElementById('in-price').value);
            if(!n || !p) return;
            const key = currentBooth + '_products';
            const items = getSafe(key);
            items.push({ id: Date.now(), name: n, price: p });
            localStorage.setItem(key, JSON.stringify(items));
            document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
            renderEditList(); render();
        }
        function renderEditList() {
            document.getElementById('edit-list').innerHTML = getSafe(currentBooth + '_products').map(p => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl">
                    <span class="text-[10px] font-bold uppercase">${p.name} ($${p.price})</span>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400 font-bold text-[10px]">Borrar</button>
                </div>
            `).join('');
        }
        function deleteProduct(id) {
            const items = getSafe(currentBooth + '_products').filter(i => i.id !== id);
            localStorage.setItem(currentBooth + '_products', JSON.stringify(items));
            renderEditList(); render();
        }

        // Gastos
        function openExpenses() { document.getElementById('expenses-modal').classList.remove('hidden'); renderExpList(); }
        function saveExpense(method) {
            const n = document.getElementById('exp-name').value;
            const a = parseInt(document.getElementById('exp-price').value);
            if(!n || !a) return;
            const exps = getSafe('global_expenses');
            exps.push({ id: Date.now(), name: n, amount: a, method });
            localStorage.setItem('global_expenses', JSON.stringify(exps));
            document.getElementById('exp-name').value = ""; document.getElementById('exp-price').value = "";
            renderExpList(); render();
        }
        function renderExpList() {
            document.getElementById('expenses-list').innerHTML = getSafe('global_expenses').map(e => `
                <div class="flex justify-between p-4 bg-red-50 rounded-2xl text-[10px] font-bold text-red-800 uppercase">
                    <span>${e.name} (${e.method})</span><span>-$${e.amount}</span>
                </div>
            `).join('');
        }

        // Notas
        function openNotes() { /* Podés agregar la lógica de notas aquí similar a gastos */ alert("Próximamente notas"); }

        // Auxiliares
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function forceReset() {
            if(confirm("⚠️ ¿Cerrar caja? Esto limpiará ventas y gastos para empezar de $0.")) {
                localStorage.setItem('bijou_sales', '[]');
                localStorage.setItem('okidokie_sales', '[]');
                localStorage.setItem('global_expenses', '[]');
                render();
            }
        }

        window.onload = () => {
            checkIntegrity();
            render();
        };
    </script>
</body>
</html>

```
