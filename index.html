<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caja Feria - Control Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }
        .active-tab-estilo { border-bottom: 4px solid #db2777; color: #db2777; font-weight: 900; }
        .active-tab-oki { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 900; }
        .product-card { background: white; border-radius: 1.5rem; padding: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; flex-direction: column; justify-content: space-between; height: 110px; border: 1px solid #f1f5f9; }
        .history-card { background: white; border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 0.8rem; border-left: 5px solid #64748b; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-24">

    <div id="app" class="max-w-md mx-auto px-4">
        <!-- Navegación -->
        <nav class="flex bg-white border-b sticky top-0 z-40 -mx-4 mb-6 shadow-sm no-print">
            <button onclick="switchBooth('estilo')" id="tab-estilo" class="flex-1 py-4 text-[10px] uppercase active-tab-estilo tracking-tight">✨ A TU ESTILO.</button>
            <button onclick="switchBooth('oki')" id="tab-oki" class="flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight">🤖 OKIEDOKIE</button>
        </nav>

        <!-- Dinero en Caja -->
        <div class="grid grid-cols-2 gap-4 mb-6 no-print">
            <div class="bg-[#10b981] p-5 rounded-[2rem] text-white shadow-lg">
                <p class="text-[8px] font-black uppercase opacity-80 tracking-widest mb-1">Efectivo Hoy</p>
                <p id="total-cash" class="text-xl font-extrabold">$0</p>
            </div>
            <div class="bg-[#0ea5e9] p-5 rounded-[2rem] text-white shadow-lg">
                <p class="text-[8px] font-black uppercase opacity-80 tracking-widest mb-1">M. Pago Hoy</p>
                <p id="total-mp" class="text-xl font-extrabold">$0</p>
            </div>
        </div>

        <!-- Productos -->
        <div id="products-grid" class="grid grid-cols-2 gap-3 mb-8"></div>

        <!-- Botones de Acción -->
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-50 no-print space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="openConfig()" class="py-4 bg-slate-100 text-slate-600 font-black rounded-2xl uppercase text-[9px]">📦 Stock</button>
                <button onclick="openExpenses()" class="py-4 bg-red-50 text-red-600 font-black rounded-2xl uppercase text-[9px]">💸 Gastos</button>
                <button onclick="openNotes()" class="py-4 bg-amber-50 text-amber-600 font-black rounded-2xl uppercase text-[9px]">📝 Notas</button>
            </div>
            <button onclick="openHistory()" class="w-full py-4 bg-indigo-50 text-indigo-600 font-black rounded-2xl uppercase text-[10px] tracking-widest">📂 Ver Historial de Cierres</button>
            <button onclick="handleCloseDay()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl shadow-lg uppercase text-xs">⚠️ Cerrar Caja del Día</button>
        </div>
    </div>

    <!-- MODAL: NOTAS (RECUPERADO) -->
    <div id="notes-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-xs text-amber-600">Bloc de Notas / Pendientes</h2>
                <button onclick="closeModal('notes-modal')" class="text-2xl">✕</button>
            </div>
            <textarea id="notes-input" placeholder="Escribe aquí notas, pedidos o deudas..." class="w-full h-48 p-4 bg-amber-50 border border-amber-100 rounded-3xl font-bold text-sm outline-none mb-4" oninput="saveNotes()"></textarea>
            <p class="text-[9px] text-amber-400 font-black uppercase text-center">Se guarda automáticamente al escribir</p>
        </div>
    </div>

    <!-- MODAL: HISTORIAL -->
    <div id="history-modal" class="hidden fixed inset-0 bg-slate-50 z-[200] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-xs tracking-widest text-slate-500">Historial de Cierres</h2>
                <button onclick="closeModal('history-modal')" class="text-2xl font-bold bg-white w-10 h-10 rounded-full shadow-sm">✕</button>
            </div>
            <div id="history-list" class="space-y-4"></div>
            <button onclick="clearHistory()" class="mt-12 w-full py-4 text-red-400 font-bold text-[10px] uppercase border border-red-100 rounded-2xl">Borrar Todo el Historial</button>
        </div>
    </div>

    <!-- MODAL: DETALLE DEL CIERRE -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-white z-[250] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between mb-8 items-center no-print">
                <button onclick="closeModal('detail-modal')" class="font-black text-slate-400 text-[10px] uppercase">✕ Volver</button>
                <button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-black">IMPRIMIR</button>
            </div>
            <div id="detail-content"></div>
        </div>
    </div>

    <!-- MODAL: VENTA -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 shadow-2xl text-center">
            <h3 id="confirm-name" class="font-black uppercase text-slate-800 mb-6"></h3>
            <div class="flex justify-center gap-6 mb-8 items-center">
                <button onclick="modQty(-1)" class="w-12 h-12 bg-slate-100 rounded-full text-xl font-bold">−</button>
                <span id="confirm-qty" class="text-3xl font-black">1</span>
                <button onclick="modQty(1)" class="w-12 h-12 bg-slate-100 rounded-full text-xl font-bold">+</button>
            </div>
            <div class="grid gap-3">
                <button onclick="doSale('cash')" class="py-5 bg-emerald-500 text-white font-black rounded-2xl uppercase text-xs">Efectivo</button>
                <button onclick="doSale('mp')" class="py-5 bg-sky-500 text-white font-black rounded-2xl uppercase text-xs">Mercado Pago</button>
                <button onclick="closeModal('confirm-modal')" class="py-3 text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL GASTOS -->
    <div id="expenses-modal" class="hidden fixed inset-0 bg-white z-[150] p-6">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-xs text-red-500">Registrar Gasto</h2>
                <button onclick="closeModal('expenses-modal')" class="text-2xl">✕</button>
            </div>
            <div class="space-y-4">
                <input id="exp-desc" type="text" placeholder="Concepto (ej: Comida)" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none">
                <input id="exp-amt" type="number" placeholder="Monto $" class="w-full p-4 bg-slate-50 rounded-xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="addExp('cash')" class="py-4 bg-emerald-500 text-white font-black rounded-xl text-[10px] uppercase">Efectivo</button>
                    <button onclick="addExp('mp')" class="py-4 bg-sky-500 text-white font-black rounded-xl text-[10px] uppercase">M. Pago</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL STOCK -->
    <div id="config-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-xs">Gestionar Productos</h2>
                <button onclick="closeModal('config-modal')" class="text-2xl">✕</button>
            </div>
            <div class="bg-slate-50 p-6 rounded-3xl mb-8">
                <input id="new-name" type="text" placeholder="Nombre" class="w-full p-4 rounded-xl mb-3 font-bold outline-none">
                <input id="new-price" type="number" placeholder="Precio $" class="w-full p-4 rounded-xl mb-4 font-bold outline-none">
                <button onclick="addProduct()" class="w-full py-4 bg-black text-white font-black rounded-xl uppercase text-[10px]">Añadir Producto</button>
            </div>
            <div id="stock-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        let currentBooth = 'estilo';
        let selProduct = null;
        let selQty = 1;

        const load = (key) => {
            const data = localStorage.getItem(key);
            if (!data) return [];
            try { return JSON.parse(data); } catch(e) { return []; }
        };
        const save = (key, val) => localStorage.setItem(key, JSON.stringify(val));

        function switchBooth(b) {
            currentBooth = b;
            document.getElementById('tab-estilo').className = b === 'estilo' ? 'flex-1 py-4 text-[10px] uppercase active-tab-estilo tracking-tight' : 'flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight';
            document.getElementById('tab-oki').className = b === 'oki' ? 'flex-1 py-4 text-[10px] uppercase active-tab-oki tracking-tight' : 'flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight';
            render();
        }

        function render() {
            let cash = 0, mp = 0;
            ['estilo', 'oki'].forEach(p => {
                load(p + '_v').forEach(v => { if(v.m === 'cash') cash += v.t; else mp += v.t; });
                load(p + '_g').forEach(g => { if(g.m === 'cash') cash -= g.a; else mp -= g.a; });
            });
            document.getElementById('total-cash').innerText = "$" + cash.toLocaleString();
            document.getElementById('total-mp').innerText = "$" + mp.toLocaleString();
            const grid = document.getElementById('products-grid');
            const prods = load(currentBooth + '_p');
            grid.innerHTML = prods.map(p => `
                <button onclick="openSale(${p.id})" class="product-card">
                    <span class="text-[10px] font-black uppercase text-slate-500">${p.n}</span>
                    <span class="text-indigo-600 font-black">$${p.p.toLocaleString()}</span>
                </button>
            `).join('');
        }

        function openSale(id) {
            selProduct = load(currentBooth + '_p').find(p => p.id === id);
            selQty = 1;
            document.getElementById('confirm-name').innerText = selProduct.n;
            document.getElementById('confirm-qty').innerText = "1";
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function modQty(v) { selQty = Math.max(1, selQty + v); document.getElementById('confirm-qty').innerText = selQty; }
        function doSale(m) {
            const list = load(currentBooth + '_v');
            list.push({ id: Date.now(), n: selProduct.n, q: selQty, t: selProduct.p * selQty, m, h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            save(currentBooth + '_v', list);
            closeModal('confirm-modal');
            render();
        }

        function addExp(m) {
            const d = document.getElementById('exp-desc').value, a = parseInt(document.getElementById('exp-amt').value);
            if(!d || !a) return;
            const list = load(currentBooth + '_g');
            list.push({ id: Date.now(), d, a, m });
            save(currentBooth + '_g', list);
            document.getElementById('exp-desc').value = ""; document.getElementById('exp-amt').value = "";
            closeModal('expenses-modal');
            render();
        }

        function handleCloseDay() {
            const vE = load('estilo_v'), vO = load('oki_v'), gE = load('estilo_g'), gO = load('oki_g');
            if (vE.length === 0 && vO.length === 0 && gE.length === 0 && gO.length === 0) return alert("Sin movimientos.");
            if(confirm("¿Cerrar caja? Se guardará en historial.")) {
                const history = load('feria_history_v2');
                history.unshift({ id: Date.now(), fecha: new Date().toLocaleDateString(), hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), vE, vO, gE, gO, totalE: document.getElementById('total-cash').innerText, totalM: document.getElementById('total-mp').innerText });
                save('feria_history_v2', history);
                ['estilo', 'oki'].forEach(p => { save(p + '_v', []); save(p + '_g', []); });
                render();
                openHistory();
            }
        }

        function openHistory() {
            const history = load('feria_history_v2');
            const list = document.getElementById('history-list');
            list.innerHTML = history.length === 0 ? '<div class="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Vacío</div>' : history.map(h => `
                <div class="history-card" onclick='showDetail(${JSON.stringify(h)})'>
                    <div class="flex justify-between items-center">
                        <div><p class="text-[11px] font-black uppercase">${h.fecha}</p><p class="text-[9px] text-slate-400 font-bold">${h.hora}</p></div>
                        <div class="text-right"><p class="text-[11px] font-black text-emerald-500">${h.totalE}</p><p class="text-[11px] font-black text-sky-500">${h.totalM}</p></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('history-modal').classList.remove('hidden');
        }

        function showDetail(h) {
            document.getElementById('detail-content').innerHTML = `
                <div class="text-center border-b pb-6 mb-6">
                    <h2 class="text-xl font-black uppercase">Resumen ${h.fecha}</h2>
                </div>
                <div class="space-y-6 text-[11px]">
                    <div><p class="font-black text-pink-500 border-b mb-2">A TU ESTILO</p>${h.vE.map(v => `<div class="flex justify-between"><span>${v.n} x${v.q}</span><span>$${v.t}</span></div>`).join('') || 'Sin ventas'}</div>
                    <div><p class="font-black text-indigo-500 border-b mb-2">OKIEDOKIE</p>${h.vO.map(v => `<div class="flex justify-between"><span>${v.n} x${v.q}</span><span>$${v.t}</span></div>`).join('') || 'Sin ventas'}</div>
                </div>
                <div class="mt-8 p-6 bg-slate-900 rounded-3xl text-white font-black">
                    <div class="flex justify-between mb-2"><span>EFECTIVO:</span><span class="text-emerald-400">${h.totalE}</span></div>
                    <div class="flex justify-between"><span>M. PAGO:</span><span class="text-sky-400">${h.totalM}</span></div>
                </div>`;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        // Lógica de Notas
        function openNotes() {
            document.getElementById('notes-input').value = localStorage.getItem('feria_notes') || "";
            document.getElementById('notes-modal').classList.remove('hidden');
        }
        function saveNotes() {
            localStorage.setItem('feria_notes', document.getElementById('notes-input').value);
        }

        function openExpenses() { document.getElementById('expenses-modal').classList.remove('hidden'); }
        function openConfig() { document.getElementById('config-modal').classList.remove('hidden'); renderStock(); }
        function addProduct() {
            const n = document.getElementById('new-name').value, p = parseInt(document.getElementById('new-price').value);
            if(!n || !p) return;
            const list = load(currentBooth + '_p');
            list.push({ id: Date.now(), n, p });
            save(currentBooth + '_p', list);
            document.getElementById('new-name').value = ""; document.getElementById('new-price').value = "";
            renderStock(); render();
        }
        function renderStock() {
            document.getElementById('stock-list').innerHTML = load(currentBooth + '_p').map(p => `
                <div class="flex justify-between p-4 bg-slate-50 rounded-2xl items-center mb-1">
                    <div><p class="text-[10px] font-black uppercase">${p.n}</p><p class="text-indigo-500 font-bold">$${p.p}</p></div>
                    <button onclick="delProd(${p.id})" class="text-red-400 font-bold">✕</button>
                </div>`).join('');
        }
        function delProd(id) { const list = load(currentBooth + '_p').filter(p => p.id !== id); save(currentBooth + '_p', list); renderStock(); render(); }
        function clearHistory() { if(confirm("¿Borrar historial?")) { save('feria_history_v2', []); openHistory(); } }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = render;
    </script>
</body>
</html>

```
