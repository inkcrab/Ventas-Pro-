<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja Feria Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; user-select: none; }
        .active-tab-bijou { border-bottom: 4px solid #db2777; color: #db2777; }
        .active-tab-3d { border-bottom: 4px solid #4f46e5; color: #4f46e5; }
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="min-h-screen pb-32">
    <div id="app" class="max-w-md mx-auto px-4">
        <nav class="flex bg-white border-b sticky top-0 z-30 -mx-4 mb-4 shadow-sm no-print">
            <button onclick="switchBooth('bijou')" id="tab-bijou" class="flex-1 py-4 text-[11px] font-extrabold uppercase active-tab-bijou">✨ Bijou</button>
            <button onclick="switchBooth('okidokie')" id="tab-okidokie" class="flex-1 py-4 text-[11px] font-extrabold uppercase text-slate-400">🤖 3D</button>
        </nav>
        <div class="grid grid-cols-2 gap-3 mb-4 no-print">
            <div class="bg-emerald-500 p-4 rounded-2xl text-white shadow-lg"><p class="text-[9px] font-bold uppercase opacity-80">Efectivo</p><p id="total-cash" class="text-xl font-extrabold">$0</p></div>
            <div class="bg-sky-500 p-4 rounded-2xl text-white shadow-lg"><p class="text-[9px] font-bold uppercase opacity-80">M. Pago</p><p id="total-mp" class="text-xl font-extrabold">$0</p></div>
        </div>
        <div id="products-grid" class="grid grid-cols-2 gap-3 mb-8"></div>
        <div class="space-y-3 bg-white p-6 rounded-[2rem] border shadow-sm no-print text-center">
            <button onclick="generateReport()" class="w-full py-4 bg-slate-900 text-white font-bold rounded-xl uppercase text-sm">📄 Reporte con Horarios</button>
            <button onclick="openConfig()" class="text-[10px] font-bold text-slate-400 uppercase">📦 Gestionar Stock</button>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-sm z-[110] flex items-center justify-center p-6 no-print">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl">
            <h3 id="confirm-item-name" class="text-xl font-black mb-4 uppercase">Producto</h3>
            <div class="flex items-center justify-center gap-6 mb-6">
                <button onclick="updateQty(-1)" class="w-12 h-12 bg-slate-100 rounded-full font-bold text-xl">−</button>
                <span id="confirm-qty" class="text-3xl font-black">1</span>
                <button onclick="updateQty(1)" class="w-12 h-12 bg-slate-100 rounded-full font-bold text-xl">+</button>
            </div>
            <p id="confirm-total" class="text-3xl font-black text-indigo-600 mb-8">$0</p>
            <button onclick="confirmSale('cash')" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-2xl mb-2 text-xs uppercase">💵 Efectivo</button>
            <button onclick="confirmSale('mp')" class="w-full py-4 bg-sky-500 text-white font-bold rounded-2xl mb-4 text-xs uppercase">📱 M. Pago</button>
            <button onclick="closeConfirm()" class="text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
        </div>
    </div>

    <div id="report-modal" class="hidden fixed inset-0 bg-white z-[120] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <button onclick="closeReport()" class="mb-4 font-bold uppercase text-xs">✕ Cerrar</button>
            <div id="report-content"></div>
        </div>
    </div>

    <script>
        let currentBooth = 'bijou';
        let pendingItem = null;
        let currentQty = 1;

        const getProducts = (b) => JSON.parse(localStorage.getItem(b + '_items')) || [];
        const getSales = (b) => JSON.parse(localStorage.getItem(b + '_sales')) || [];
        const saveState = (b, i, s) => { localStorage.setItem(b + '_items', JSON.stringify(i)); localStorage.setItem(b + '_sales', JSON.stringify(s)); };

        function switchBooth(b) {
            currentBooth = b;
            document.getElementById('tab-bijou').className = b === 'bijou' ? 'flex-1 py-4 text-[11px] font-extrabold uppercase active-tab-bijou' : 'flex-1 py-4 text-[11px] font-extrabold uppercase text-slate-400';
            document.getElementById('tab-okidokie').className = b === 'okidokie' ? 'flex-1 py-4 text-[11px] font-extrabold uppercase active-tab-3d' : 'flex-1 py-4 text-[11px] font-extrabold uppercase text-slate-400';
            render();
        }

        function render() {
            const items = getProducts(currentBooth);
            const sales = getSales(currentBooth);
            let cash = 0, mp = 0;
            sales.forEach(s => s.method === 'cash' ? cash += s.totalPrice : mp += s.totalPrice);
            document.getElementById('total-cash').innerText = "$" + cash;
            document.getElementById('total-mp').innerText = "$" + mp;
            document.getElementById('products-grid').innerHTML = items.map(i => `
                <button onclick="askConfirmation(${i.id})" class="bg-white border p-5 rounded-[2rem] text-left shadow-sm btn-active flex flex-col justify-between h-28">
                    <h4 class="font-black text-[10px] uppercase truncate">${i.name}</h4>
                    <p class="text-indigo-600 font-black text-sm">$${i.price}</p>
                </button>
            `).join('');
        }

        function askConfirmation(id) {
            pendingItem = getProducts(currentBooth).find(i => i.id === id);
            currentQty = 1; updateQtyDisplay();
            document.getElementById('confirm-item-name').innerText = pendingItem.name;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }

        function updateQty(v) { currentQty = Math.max(1, currentQty + v); updateQtyDisplay(); }
        function updateQtyDisplay() {
            document.getElementById('confirm-qty').innerText = currentQty;
            document.getElementById('confirm-total').innerText = "$" + (pendingItem.price * currentQty);
        }

        function confirmSale(method) {
            const sales = getSales(currentBooth);
            const ahora = new Date();
            const hora = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
            sales.push({ ...pendingItem, method, qty: currentQty, totalPrice: pendingItem.price * currentQty, hora });
            saveState(currentBooth, getProducts(currentBooth), sales);
            closeConfirm(); render();
        }

        function generateReport() {
            const sales = getSales(currentBooth);
            const list = sales.slice().reverse().map(s => `
                <div class="flex justify-between border-b py-3 text-[11px]">
                    <span class="text-slate-400 font-bold">${s.hora}hs</span>
                    <span class="font-black uppercase flex-1 ml-3">${s.name} (x${s.qty})</span>
                    <span class="font-bold">$${s.totalPrice}</span>
                </div>
            `).join('');
            document.getElementById('report-content').innerHTML = `<h2 class="font-black uppercase mb-4 text-center">Ventas con Hora</h2>${list || 'Sin ventas'}`;
            document.getElementById('report-modal').classList.remove('hidden');
        }

        function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }
        function closeReport() { document.getElementById('report-modal').classList.add('hidden'); }
        function openConfig() { alert("Para editar productos, usá el botón Gestión de antes."); }

        window.onload = render;
    </script>
</body>
</html>
