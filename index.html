<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ventas Pro - Feria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfcfd; 
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-active-pink { border-bottom: 4px solid #db2777; color: #db2777; font-weight: 800; }
        .tab-active-blue { border-bottom: 4px solid #6366f1; color: #6366f1; font-weight: 800; }
        
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        
        .product-card {
            background: white;
            border-radius: 2rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 160px;
            transition: transform 0.1s;
            border: 1px solid #f1f5f9;
            position: relative;
        }
        
        .product-card:active { transform: scale(0.95); }
        .out-of-stock { opacity: 0.6; border: 2px solid #fee2e2; }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        .badge-stock {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="app" class="max-w-md mx-auto px-4 pt-4">
        <!-- Navegación -->
        <nav class="flex bg-white sticky top-0 z-40 -mx-4 mb-4 no-print border-b">
            <button onclick="changeBooth('bijou')" id="tab-bijou" class="flex-1 py-4 text-[11px] uppercase tracking-wider transition-all">✨ A TU ESTILO.</button>
            <button onclick="changeBooth('oki')" id="tab-oki" class="flex-1 py-4 text-[11px] uppercase tracking-wider text-slate-400 transition-all">🤖 OKIEDOKIE</button>
        </nav>

        <!-- Totales -->
        <div class="grid grid-cols-2 gap-3 mb-4 no-print">
            <div class="bg-[#10b981] p-5 rounded-[1.8rem] text-white card-shadow">
                <p class="text-[9px] font-bold uppercase opacity-90 mb-1">Efectivo</p>
                <p id="cash-display" class="text-2xl font-extrabold">$0</p>
            </div>
            <div class="bg-[#0ea5e9] p-5 rounded-[1.8rem] text-white card-shadow">
                <p class="text-[9px] font-bold uppercase opacity-90 mb-1">M. Pago</p>
                <p id="mp-display" class="text-2xl font-extrabold">$0</p>
            </div>
        </div>

        <!-- Botones de Gestión -->
        <div class="grid grid-cols-3 gap-2 mb-6 no-print">
            <button onclick="openModal('stock-modal'); renderStock();" class="btn-action bg-white border border-slate-100 text-[#475569] shadow-sm">📦 STOCK</button>
            <button onclick="openNotes()" class="btn-action bg-white border border-slate-100 text-[#d97706] shadow-sm">📝 NOTAS</button>
            <button onclick="openModal('expenses-modal')" class="btn-action bg-white border border-slate-100 text-[#dc2626] shadow-sm">💸 GASTOS</button>
        </div>

        <!-- Buscador -->
        <div class="space-y-3 mb-8 no-print">
            <div class="relative flex items-center">
                <input type="text" id="product-search" oninput="handleSearch()" placeholder="🔍 Buscar producto..." class="w-full py-4 px-6 pr-12 rounded-2xl bg-white border border-slate-100 shadow-sm outline-none font-medium text-slate-500">
                <button id="clear-search" onclick="clearSearch()" class="absolute right-4 hidden text-slate-300 hover:text-slate-500 text-xl font-bold">✕</button>
            </div>
            <div id="quick-add-container" class="hidden">
                <button onclick="quickAddProduct()" class="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl font-bold text-[11px] uppercase border border-indigo-100">
                    ➕ Incorporar "<span id="quick-add-name"></span>" al stock
                </button>
            </div>
        </div>

        <!-- Ventas Recientes -->
        <div class="mb-8 no-print">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Ventas Recientes</h3>
                <button onclick="openModal('sales-manager-modal'); renderSalesManager();" class="text-[9px] font-bold text-indigo-600 uppercase underline">Administrar</button>
            </div>
            <div id="real-time-sales" class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide"></div>
        </div>

        <!-- Grid de Productos -->
        <div id="products-grid" class="grid grid-cols-2 gap-4 mb-10"></div>

        <!-- Acciones Finales -->
        <div class="space-y-3 no-print">
            <button onclick="showTodayReport()" class="w-full py-4 bg-[#111827] text-white font-bold rounded-2xl flex items-center justify-center gap-2 uppercase text-xs tracking-tight">
                📄 REPORTE DE HOY
            </button>
            <button onclick="openHistory()" class="w-full py-4 bg-[#f8fafc] text-slate-500 font-bold rounded-2xl flex items-center justify-center gap-2 uppercase text-[10px] border border-slate-100">
                📂 HISTORIAL DE CIERRES
            </button>
            <button onclick="confirmCloseBooth()" class="w-full py-4 bg-red-50 text-red-500 font-bold rounded-2xl flex items-center justify-center gap-2 uppercase text-[10px] border border-red-100">
                ⚠️ FINALIZAR JORNADA Y CERRAR CAJA
            </button>
        </div>
    </div>

    <!-- MODAL ADMINISTRADOR DE VENTAS -->
    <div id="sales-manager-modal" class="hidden fixed inset-0 bg-white z-[200] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-bold uppercase text-xs">🛠️ Control de Ventas</h2>
                <button onclick="closeModal('sales-manager-modal')" class="text-2xl">✕</button>
            </div>
            <div id="sale-editor-form" class="hidden bg-slate-50 p-6 rounded-[2rem] mb-8 border border-slate-100 shadow-inner">
                <h4 class="text-[10px] font-black uppercase text-indigo-500 mb-4">Editar Venta</h4>
                <input type="hidden" id="edit-sale-id">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">Cant.</label>
                        <input id="edit-sale-qty" type="number" class="w-full p-4 rounded-xl font-bold outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-2">Total $</label>
                        <input id="edit-sale-total" type="number" class="w-full p-4 rounded-xl font-bold outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="saveSaleEdit()" class="py-4 bg-indigo-600 text-white font-bold rounded-xl uppercase text-[10px]">Actualizar</button>
                    <button onclick="closeSaleEditor()" class="py-4 bg-slate-200 text-slate-500 font-bold rounded-xl uppercase text-[10px]">Cancelar</button>
                </div>
            </div>
            <div id="sales-manager-list" class="space-y-3"></div>
        </div>
    </div>

    <!-- MODAL VENTA -->
    <div id="sale-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-[150] flex items-end justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 card-shadow text-center">
            <h3 id="sale-product-name" class="font-extrabold uppercase text-slate-800 text-lg mb-2"></h3>
            <p id="sale-stock-warning" class="text-[10px] font-bold text-red-500 uppercase mb-6"></p>
            <div class="flex justify-center gap-6 mb-8 items-center">
                <button onclick="changeQty(-1)" class="w-12 h-12 bg-slate-100 rounded-full text-2xl font-bold">−</button>
                <span id="sale-qty" class="text-4xl font-black">1</span>
                <button onclick="changeQty(1)" class="w-12 h-12 bg-slate-100 rounded-full text-2xl font-bold">+</button>
            </div>
            <div class="grid gap-3">
                <button onclick="processSale('cash')" class="py-5 bg-emerald-500 text-white font-bold rounded-2xl uppercase text-xs">Efectivo</button>
                <button onclick="processSale('mp')" class="py-5 bg-sky-500 text-white font-bold rounded-2xl uppercase text-xs">Mercado Pago</button>
                <button onclick="closeModal('sale-modal')" class="py-3 text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL STOCK -->
    <div id="stock-modal" class="hidden fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-bold uppercase text-xs">📦 Stock</h2>
                <button onclick="closeModal('stock-modal')" class="text-2xl">✕</button>
            </div>
            <div class="bg-slate-50 p-6 rounded-[2rem] mb-6 space-y-3">
                <input id="stock-id-edit" type="hidden">
                <input id="stock-name" type="text" placeholder="Producto" class="w-full p-4 rounded-xl font-bold">
                <div class="grid grid-cols-2 gap-3">
                    <input id="stock-price" type="number" placeholder="Precio $" class="w-full p-4 rounded-xl font-bold">
                    <input id="stock-qty" type="number" placeholder="Cant." class="w-full p-4 rounded-xl font-bold">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="saveProduct()" class="py-4 bg-black text-white font-bold rounded-xl uppercase text-[10px]">Guardar</button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden py-4 bg-slate-200 text-slate-500 font-bold rounded-xl uppercase text-[10px]">Cancelar</button>
                </div>
            </div>
            <div id="stock-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- MODAL HISTORIAL DE CIERRES -->
    <div id="history-modal" class="hidden fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto pb-10">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-bold uppercase text-xs">📂 Historial de Cierres</h2>
                <button onclick="closeModal('history-modal')" class="text-2xl">✕</button>
            </div>
            <div id="history-content" class="space-y-4"></div>
        </div>
    </div>

    <!-- MODAL DETALLE DE CIERRE ESPECÍFICO -->
    <div id="history-detail-modal" class="hidden fixed inset-0 bg-slate-50 z-[210] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <button onclick="closeModal('history-detail-modal')" class="text-slate-400 font-bold uppercase text-[10px]">← Volver</button>
                <h2 class="font-black text-xs uppercase tracking-widest">Resumen de Cierre</h2>
            </div>
            <div id="history-detail-content"></div>
        </div>
    </div>

    <!-- OTROS MODALES -->
    <div id="notes-modal" class="hidden fixed inset-0 bg-white z-[100] p-6"><div class="max-w-md mx-auto"><div class="flex justify-between items-center mb-8"><h2 class="font-bold text-amber-600 uppercase text-xs">📝 Notas</h2><button onclick="closeModal('notes-modal')" class="text-2xl">✕</button></div><textarea id="notes-input" oninput="saveNotes()" class="w-full h-[65vh] p-6 bg-amber-50 rounded-[2rem] border-none outline-none font-medium text-amber-900"></textarea></div></div>
    <div id="expenses-modal" class="hidden fixed inset-0 bg-white z-[100] p-6"><div class="max-w-md mx-auto"><div class="flex justify-between items-center mb-8"><h2 class="font-bold text-red-500 uppercase text-xs">💸 Gasto</h2><button onclick="closeModal('expenses-modal')" class="text-2xl">✕</button></div><input id="exp-desc" type="text" placeholder="Concepto" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 font-bold"><input id="exp-amt" type="number" placeholder="Monto $" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 font-bold"><div class="grid grid-cols-2 gap-3"><button onclick="saveExpense('cash')" class="py-4 bg-emerald-500 text-white font-bold rounded-2xl text-[10px] uppercase">Efectivo</button><button onclick="saveExpense('mp')" class="py-4 bg-sky-500 text-white font-bold rounded-2xl text-[10px] uppercase">M. Pago</button></div></div></div>
    <div id="report-modal" class="hidden fixed inset-0 bg-white z-[200] p-6 overflow-y-auto"><div class="max-w-md mx-auto"><div class="flex justify-between items-center no-print mb-8"><button onclick="closeModal('report-modal')" class="text-slate-400 font-bold uppercase text-[10px]">✕</button><button onclick="window.print()" class="bg-black text-white px-4 py-2 rounded-xl text-[10px]">IMPRIMIR</button></div><div id="report-content"></div></div></div>

    <script>
        let currentBooth = 'bijou';
        let selectedProduct = null;
        let selectedQty = 1;

        const db = {
            get: (key) => { try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e) { return []; } },
            set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error("Error", e); } }
        };

        window.onload = () => {
            if(db.get('bijou_products').length === 0) {
                db.set('bijou_products', [{id:1, n:'Ejemplo Bijou', p:1000, s:10}]);
                db.set('oki_products', [{id:101, n:'Ejemplo Oki', p:5000, s:5}]);
            }
            setBooth('bijou');
        };

        function setBooth(b) {
            currentBooth = b;
            const tB = document.getElementById('tab-bijou'), tO = document.getElementById('tab-oki');
            if(b === 'bijou') { tB.className = "flex-1 py-4 text-[11px] uppercase tracking-wider tab-active-pink"; tO.className = "flex-1 py-4 text-[11px] uppercase tracking-wider text-slate-400"; }
            else { tB.className = "flex-1 py-4 text-[11px] uppercase tracking-wider text-slate-400"; tO.className = "flex-1 py-4 text-[11px] uppercase tracking-wider tab-active-blue"; }
            render(); renderRealTimeSales();
        }

        function changeBooth(b) { clearSearch(); setBooth(b); }
        function clearSearch() { document.getElementById('product-search').value = ""; document.getElementById('clear-search').classList.add('hidden'); document.getElementById('quick-add-container').classList.add('hidden'); render(); }
        function handleSearch() {
            const q = document.getElementById('product-search').value, clearBtn = document.getElementById('clear-search'), quickAdd = document.getElementById('quick-add-container'), prods = db.get(`${currentBooth}_products`);
            if(q.length > 0) clearBtn.classList.remove('hidden'); else clearBtn.classList.add('hidden');
            const match = prods.some(p => p.n.toLowerCase() === q.toLowerCase());
            if(q.length > 2 && !match) { quickAdd.classList.remove('hidden'); document.getElementById('quick-add-name').innerText = q; } else quickAdd.classList.add('hidden');
            render();
        }

        function render() {
            let bC = 0, bM = 0;
            db.get(`${currentBooth}_sales`).forEach(s => { if(s.m === 'cash') bC += s.t; else bM += s.t; });
            db.get(`${currentBooth}_expenses`).forEach(e => { if(e.m === 'cash') bC -= e.a; else bM -= e.a; });
            document.getElementById('cash-display').innerText = `$${bC.toLocaleString()}`;
            document.getElementById('mp-display').innerText = `$${bM.toLocaleString()}`;
            const q = document.getElementById('product-search').value.toLowerCase(), prods = db.get(`${currentBooth}_products`), grid = document.getElementById('products-grid');
            grid.innerHTML = prods.filter(p => p.n.toLowerCase().includes(q)).map(p => {
                const isOut = p.s <= 0;
                return `<button onclick="openSale(${p.id})" class="product-card card-shadow ${isOut ? 'out-of-stock' : ''}"><span class="badge-stock ${isOut ? 'bg-red-500 text-white' : 'bg-slate-100 text-slate-500'}">${isOut ? 'SIN STOCK' : p.s + ' u.'}</span><span class="text-[11px] font-bold uppercase text-slate-400 mb-2 truncate w-full">${p.n}</span><span class="text-xl font-extrabold text-[#6366f1]">$${p.p.toLocaleString()}</span></button>`
            }).join('');
        }

        function openSale(id) { selectedProduct = db.get(`${currentBooth}_products`).find(p => p.id === id); selectedQty = 1; document.getElementById('sale-product-name').innerText = selectedProduct.n; document.getElementById('sale-qty').innerText = "1"; document.getElementById('sale-stock-warning').innerText = selectedProduct.s <= 0 ? "¡VENDIENDO SIN STOCK!" : ""; openModal('sale-modal'); }
        function processSale(m) {
            const s = db.get(`${currentBooth}_sales`);
            s.unshift({ id: Date.now(), pid: selectedProduct.id, n: selectedProduct.n, q: selectedQty, t: selectedProduct.p * selectedQty, m, h: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            db.set(`${currentBooth}_sales`, s);
            let pr = db.get(`${currentBooth}_products`);
            pr = pr.map(p => p.id === selectedProduct.id ? {...p, s: p.s - selectedQty} : p);
            db.set(`${currentBooth}_products`, pr);
            closeModal('sale-modal'); clearSearch(); renderRealTimeSales();
        }
        function changeQty(v) { selectedQty = Math.max(1, selectedQty + v); document.getElementById('sale-qty').innerText = selectedQty; }

        function renderSalesManager() {
            const s = db.get(`${currentBooth}_sales`), container = document.getElementById('sales-manager-list');
            if(s.length === 0) { container.innerHTML = `<p class="text-center py-10 text-slate-300 uppercase text-[10px] font-bold">No hay ventas</p>`; return; }
            container.innerHTML = s.map(s => `<div class="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center"><div><p class="text-[9px] font-bold text-slate-400 uppercase">${s.h} - ${s.m==='cash'?'EFE':'MP'}</p><p class="font-black text-[11px] uppercase">${s.n} (x${s.q})</p><p class="font-bold text-indigo-500 text-[10px]">$${s.t}</p></div><div class="flex gap-2"><button onclick="openSaleEditor(${s.id})" class="w-10 h-10 bg-indigo-50 text-indigo-500 rounded-xl font-bold flex items-center justify-center">✏️</button><button onclick="deleteSale(${s.id})" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl font-bold flex items-center justify-center">✕</button></div></div>`).join('');
        }

        function openSaleEditor(id) { const s = db.get(`${currentBooth}_sales`).find(s => s.id === id); document.getElementById('edit-sale-id').value = s.id; document.getElementById('edit-sale-qty').value = s.q; document.getElementById('edit-sale-total').value = s.t; document.getElementById('sale-editor-form').classList.remove('hidden'); }
        function closeSaleEditor() { document.getElementById('sale-editor-form').classList.add('hidden'); }
        function saveSaleEdit() {
            const id = parseInt(document.getElementById('edit-sale-id').value), nQ = parseInt(document.getElementById('edit-sale-qty').value), nT = parseInt(document.getElementById('edit-sale-total').value);
            let s = db.get(`${currentBooth}_sales`); const idx = s.findIndex(v => v.id === id); const old = s[idx]; const diff = nQ - old.q;
            let pr = db.get(`${currentBooth}_products`); pr = pr.map(p => p.id === old.pid ? {...p, s: p.s - diff} : p); db.set(`${currentBooth}_products`, pr);
            s[idx] = { ...old, q: nQ, t: nT }; db.set(`${currentBooth}_sales`, s);
            closeSaleEditor(); renderSalesManager(); render(); renderRealTimeSales();
        }
        function deleteSale(id) { if(confirm("¿Borrar?")) { let s = db.get(`${currentBooth}_sales`); const v = s.find(x => x.id === id); let pr = db.get(`${currentBooth}_products`); pr = pr.map(p => p.id === v.pid ? {...p, s: p.s + v.q} : p); db.set(`${currentBooth}_products`, pr); db.set(`${currentBooth}_sales`, s.filter(x => x.id !== id)); renderSalesManager(); render(); renderRealTimeSales(); } }
        function renderRealTimeSales() { const s = db.get(`${currentBooth}_sales`); document.getElementById('real-time-sales').innerHTML = s.slice(0, 10).map(s => `<div class="flex-shrink-0 bg-white border border-slate-100 p-3 rounded-2xl card-shadow min-w-[120px]"><p class="text-[9px] font-bold text-slate-400 uppercase">${s.h}</p><p class="text-[11px] font-black truncate">${s.n}</p><p class="text-[10px] font-bold ${s.m==='cash'?'text-emerald-500':'text-sky-500'}">$${s.t}</p></div>`).join(''); }

        // --- HISTORIAL DETALLADO ---
        function confirmCloseBooth() {
            const bN = currentBooth === 'bijou' ? 'A TU ESTILO' : 'OKIEDOKIE';
            if(!confirm(`¿Cerrar caja de ${bN}? Se guardará el detalle completo.`)) return;
            const sales = db.get(`${currentBooth}_sales`), expenses = db.get(`${currentBooth}_expenses`);
            if(sales.length === 0 && expenses.length === 0) { alert("Sin movimientos."); return; }
            let tc = 0, tm = 0;
            sales.forEach(v => { if(v.m === 'cash') tc += v.t; else tm += v.t; });
            expenses.forEach(g => { if(g.m === 'cash') tc -= g.a; else tm -= g.a; });
            const history = db.get('feria_history_v6');
            history.unshift({ id: Date.now(), puesto: bN, fecha: new Date().toLocaleDateString(), hora: new Date().toLocaleTimeString(), totalCash: tc, totalMp: tm, detail: { sales, expenses } });
            db.set('feria_history_v6', history.slice(0, 50)); db.set(`${currentBooth}_sales`, []); db.set(`${currentBooth}_expenses`, []);
            render(); renderRealTimeSales(); openHistory();
        }

        function openHistory() {
            const h = db.get('feria_history_v6');
            document.getElementById('history-content').innerHTML = h.map(x => `
                <div class="p-5 bg-white rounded-[2rem] card-shadow border border-slate-50">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">${x.puesto}</p>
                            <h4 class="font-black text-slate-800 text-sm uppercase">${x.fecha}</h4>
                            <p class="text-[10px] text-slate-400 font-bold">${x.hora}</p>
                        </div>
                        <button onclick="deleteHistoryItem(${x.id})" class="text-slate-200 hover:text-red-400 p-2">✕</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-emerald-50 p-3 rounded-2xl"><p class="text-[8px] font-bold text-emerald-600 uppercase">Efectivo</p><p class="font-black text-emerald-700">$${x.totalCash}</p></div>
                        <div class="bg-sky-50 p-3 rounded-2xl"><p class="text-[8px] font-bold text-sky-600 uppercase">M. Pago</p><p class="font-black text-sky-700">$${x.totalMp}</p></div>
                    </div>
                    <button onclick="viewHistoryDetail(${x.id})" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold text-[10px] uppercase tracking-tighter">Ver detalle completo</button>
                </div>
