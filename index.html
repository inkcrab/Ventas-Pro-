<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Caja de Feria - POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .touch-button:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-20">

    <div id="app" class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">🎡 Mi Caja de Feria</h1>
            <button onclick="toggleConfig()" class="p-2 bg-gray-200 rounded-full">⚙️</button>
        </header>

        <!-- Resumen de Caja -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-green-100 p-4 rounded-2xl border-2 border-green-200">
                <p class="text-xs text-green-700 font-bold uppercase tracking-wider">Efectivo</p>
                <p id="total-cash" class="text-xl font-bold text-green-800">$0</p>
            </div>
            <div class="bg-blue-100 p-4 rounded-2xl border-2 border-blue-200">
                <p class="text-xs text-blue-700 font-bold uppercase tracking-wider">M. Pago</p>
                <p id="total-mp" class="text-xl font-bold text-blue-800">$0</p>
            </div>
            <div class="col-span-2 bg-white p-4 rounded-2xl border-2 border-gray-200 shadow-sm">
                <p class="text-xs text-gray-500 font-bold uppercase tracking-wider">Total General</p>
                <p id="total-general" class="text-3xl font-black text-gray-800">$0</p>
            </div>
        </div>

        <!-- Selector de Método de Pago -->
        <div class="flex gap-2 mb-6">
            <button id="btn-pay-cash" onclick="setPaymentMethod('cash')" 
                class="flex-1 py-4 rounded-xl font-bold border-4 transition-all border-green-500 bg-green-500 text-white shadow-lg">
                💵 EFECTIVO
            </button>
            <button id="btn-pay-mp" onclick="setPaymentMethod('mp')" 
                class="flex-1 py-4 rounded-xl font-bold border-4 transition-all border-transparent bg-blue-100 text-blue-600">
                📱 M. PAGO
            </button>
        </div>

        <!-- Lista de Productos -->
        <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2">
            🛍️ Productos <span class="text-xs font-normal text-gray-400">(Toca para vender)</span>
        </h2>
        <div id="products-grid" class="grid grid-cols-2 gap-3">
            <!-- Los productos se cargan aquí -->
        </div>

        <!-- Sección de Reposición -->
        <div class="mt-10 bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📝 Lista de Reposición</h2>
            <div id="restock-list" class="space-y-2">
                <p class="text-gray-400 italic text-sm text-center py-4">No hay ventas registradas aún.</p>
            </div>
            
            <button onclick="confirmCloseDay()" 
                class="w-full mt-8 py-4 bg-red-50 text-red-600 font-bold rounded-2xl border-2 border-red-100 hover:bg-red-100 active:scale-95 transition-all">
                🔒 CERRAR DÍA / LIMPIAR CAJA
            </button>
        </div>

        <!-- Modal de Configuración (Hidden by default) -->
        <div id="config-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold">Configurar Productos</h3>
                    <button onclick="toggleConfig()" class="text-2xl">&times;</button>
                </div>
                
                <div class="space-y-4 mb-6">
                    <input id="new-name" type="text" placeholder="Nombre (Ej: Pulsera)" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-indigo-400">
                    <input id="new-price" type="number" placeholder="Precio ($)" class="w-full p-3 bg-gray-100 rounded-xl outline-none focus:ring-2 ring-indigo-400">
                    <button onclick="addProduct()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl">Añadir Producto</button>
                </div>

                <div id="edit-list" class="max-h-60 overflow-y-auto space-y-2 border-t pt-4">
                    <!-- Lista para borrar productos -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO DE LA APP ---
        let products = JSON.parse(localStorage.getItem('feria_products')) || [
            { id: 1, name: "Pulsera Simple", price: 500 },
            { id: 2, name: "Anillo Piedra", price: 1200 },
            { id: 3, name: "Collar Boho", price: 2500 }
        ];

        let sales = JSON.parse(localStorage.getItem('feria_sales')) || [];
        let currentMethod = 'cash'; // 'cash' o 'mp'

        // --- FUNCIONES DE NAVEGACIÓN ---
        function toggleConfig() {
            const modal = document.getElementById('config-modal');
            modal.classList.toggle('hidden');
            renderEditList();
        }

        // --- LÓGICA DE NEGOCIO ---
        function setPaymentMethod(method) {
            currentMethod = method;
            const cashBtn = document.getElementById('btn-pay-cash');
            const mpBtn = document.getElementById('btn-pay-mp');

            if (method === 'cash') {
                cashBtn.className = "flex-1 py-4 rounded-xl font-bold border-4 transition-all border-green-500 bg-green-500 text-white shadow-lg";
                mpBtn.className = "flex-1 py-4 rounded-xl font-bold border-4 transition-all border-transparent bg-blue-100 text-blue-600";
            } else {
                mpBtn.className = "flex-1 py-4 rounded-xl font-bold border-4 transition-all border-blue-500 bg-blue-500 text-white shadow-lg";
                cashBtn.className = "flex-1 py-4 rounded-xl font-bold border-4 transition-all border-transparent bg-green-100 text-green-600";
            }
        }

        function recordSale(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const sale = {
                id: Date.now(),
                productId: product.id,
                name: product.name,
                price: product.price,
                method: currentMethod
            };

            sales.push(sale);
            saveData();
            render();
            
            // Haptic feedback simple
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function addProduct() {
            const nameInput = document.getElementById('new-name');
            const priceInput = document.getElementById('new-price');
            
            if (!nameInput.value || !priceInput.value) return;

            const newProduct = {
                id: Date.now(),
                name: nameInput.value,
                price: parseFloat(priceInput.value)
            };

            products.push(newProduct);
            nameInput.value = "";
            priceInput.value = "";
            saveData();
            render();
            renderEditList();
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            saveData();
            render();
            renderEditList();
        }

        function confirmCloseDay() {
            if (confirm("¿Estás seguro de cerrar el día? Se borrarán todas las ventas pero se mantendrán los productos.")) {
                sales = [];
                saveData();
                render();
            }
        }

        function saveData() {
            localStorage.setItem('feria_products', JSON.stringify(products));
            localStorage.setItem('feria_sales', JSON.stringify(sales));
        }

        // --- RENDERIZADO ---
        function render() {
            // Totales
            let cashTotal = 0;
            let mpTotal = 0;
            let counts = {};

            sales.forEach(sale => {
                if (sale.method === 'cash') cashTotal += sale.price;
                else mpTotal += sale.price;

                counts[sale.name] = (counts[sale.name] || 0) + 1;
            });

            document.getElementById('total-cash').innerText = `$${cashTotal.toLocaleString()}`;
            document.getElementById('total-mp').innerText = `$${mpTotal.toLocaleString()}`;
            document.getElementById('total-general').innerText = `$${(cashTotal + mpTotal).toLocaleString()}`;

            // Cuadrícula de productos
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => {
                const count = sales.filter(s => s.productId === p.id).length;
                return `
                    <button onclick="recordSale(${p.id})" 
                        class="touch-button relative bg-white border-2 border-gray-100 p-4 rounded-2xl shadow-sm text-left active:bg-gray-50 transition-all flex flex-col h-32 justify-between">
                        <div>
                            <p class="font-bold text-gray-800 leading-tight">${p.name}</p>
                            <p class="text-indigo-600 font-bold">$${p.price.toLocaleString()}</p>
                        </div>
                        ${count > 0 ? `<span class="absolute top-2 right-2 bg-indigo-500 text-white text-xs font-bold px-2 py-1 rounded-full">+${count}</span>` : ''}
                        <div class="text-xs text-gray-300 font-bold self-end">VENDER ➔</div>
                    </button>
                `;
            }).join('');

            // Lista de reposición
            const restockDiv = document.getElementById('restock-list');
            const restockItems = Object.entries(counts);
            
            if (restockItems.length === 0) {
                restockDiv.innerHTML = `<p class="text-gray-400 italic text-sm text-center py-4">No hay ventas registradas aún.</p>`;
            } else {
                restockDiv.innerHTML = restockItems.map(([name, qty]) => `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                        <span class="font-medium text-gray-700">${name}</span>
                        <span class="bg-gray-200 text-gray-700 px-3 py-1 rounded-lg font-bold text-sm">x${qty}</span>
                    </div>
                `).join('');
            }
        }

        function renderEditList() {
            const list = document.getElementById('edit-list');
            list.innerHTML = products.map(p => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                    <span class="text-sm font-medium">${p.name} ($${p.price})</span>
                    <button onclick="deleteProduct(${p.id})" class="text-red-500 p-1">🗑️</button>
                </div>
            `).join('');
        }

        // Inicialización
        window.onload = render;

    </script>
</body>
</html>

```
