<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Caja Feria - Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .active-tab-estilo { border-bottom: 4px solid #db2777; color: #db2777; font-weight: 900; }
        .active-tab-oki { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 900; }

        .product-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 140px;
            border: 1px solid #f1f5f9;
        }

        .history-card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 8px solid transparent;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-24">

    <div id="app" class="max-w-md mx-auto px-4">
        <!-- Navegación Superior -->
        <nav class="flex bg-white border-b sticky top-0 z-40 -mx-4 mb-6 shadow-sm no-print">
            <button onclick="switchBooth('estilo')" id="tab-estilo" class="flex-1 py-4 text-[10px] uppercase active-tab-estilo tracking-tight">✨ A TU ESTILO.</button>
            <button onclick="switchBooth('oki')" id="tab-oki" class="flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight">🤖 OKIEDOKIE</button>
        </nav>

        <!-- Indicadores de Dinero -->
        <div class="grid grid-cols-2 gap-4 mb-6 no-print">
            <div class="bg-[#10b981] p-6 rounded-[2.5rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">Efectivo Real</p>
                <p id="total-cash" class="text-2xl font-extrabold">$0</p>
            </div>
            <div class="bg-[#0ea5e9] p-6 rounded-[2.5rem] text-white shadow-lg">
                <p class="text-[9px] font-black uppercase opacity-80 tracking-widest mb-1">M. Pago Real</p>
                <p id="total-mp" class="text-2xl font-extrabold">$0</p>
            </div>
        </div>

        <!-- Buscador -->
        <div class="mb-6 no-print">
            <input type="text" id="search-input" oninput="render()" placeholder="🔍 Buscar producto..." 
                class="w-full p-5 bg-white border border-slate-100 rounded-[1.5rem] font-bold shadow-sm outline-none text-sm">
        </div>

        <!-- Cuadrícula de Productos -->
        <div id="products-grid" class="grid grid-cols-2 gap-4 mb-8"></div>

        <!-- Panel de Acciones -->
        <div class="bg-white p-6 rounded-[3rem] shadow-xl border border-slate-50 no-print space-y-4">
            <button onclick="generateReport()" class="w-full py-5 bg-[#1e293b] text-white font-black rounded-2xl shadow-lg uppercase text-xs">📄 Reporte con Horarios</button>
            
            <div class="grid grid-cols-3 gap-2">
                <button onclick="openConfig()" class="py-4 bg-[#f1f5f9] text-[#475569] font-black rounded-xl uppercase text-[9px]">📦 Stock</button>
                <button onclick="openNotes()" class="py-4 bg-[#fff7ed] text-[#9a3412] font-black rounded-xl uppercase text-[9px]">📝 Notas</button>
                <button onclick="openExpenses()" class="py-4 bg-[#fef2f2] text-[#991b1b] font-black rounded-xl uppercase text-[9px]">💸 Gastos</button>
            </div>

            <button onclick="openHistory()" class="w-full py-4 bg-slate-50 text-slate-400 font-black rounded-2xl uppercase text-[10px] tracking-widest">📂 Historial de Cierres</button>

            <button onclick="handleCloseDay()" class="w-full py-5 bg-red-50 text-red-600 font-black rounded-2xl border border-red-100 uppercase text-xs tracking-wider">
                ⚠️ CIERRE DE CAJA
            </button>
        </div>
    </div>

    <!-- MODAL: GASTOS (Separados por puesto) -->
    <div id="expenses-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 id="expense-title" class="font-black uppercase text-[10px] tracking-widest text-red-400">💸 Gastos</h2>
                <button onclick="closeModal('expenses-modal')" class="text-2xl">✕</button>
            </div>
            <div class="bg-red-50 p-6 rounded-[2.5rem] mb-8 border border-red-100">
                <p id="expense-booth-label" class="text-[8px] font-black uppercase text-red-300 mb-4 tracking-tighter text-center">Cargando a puesto actual</p>
                <input id="exp-name" type="text" placeholder="Concepto" class="w-full p-4 rounded-xl mb-3 font-bold text-sm bg-white outline-none">
                <input id="exp-price" type="number" placeholder="Monto ($)" class="w-full p-4 rounded-xl mb-6 font-bold text-sm bg-white outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="saveExpense('cash')" class="py-4 bg-[#10b981] text-white font-black rounded-xl uppercase text-[9px]">Efectivo</button>
                    <button onclick="saveExpense('mp')" class="py-4 bg-[#0ea5e9] text-white font-black rounded-xl uppercase text-[9px]">M. Pago</button>
                </div>
            </div>
            <div id="expenses-list" class="space-y-2"></div>
        </div>
    </div>

    <!-- MODAL: CONFIRMACIÓN VENTA -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3.5rem] p-8 shadow-2xl">
            <h3 id="confirm-item-name" class="text-lg font-black text-slate-800 mb-4 uppercase text-center tracking-tight">Producto</h3>
            <div class="flex items-center justify-center gap-8 mb-8">
                <button onclick="updateQty(-1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">−</button>
                <span id="confirm-qty" class="text-4xl font-black text-slate-900">1</span>
                <button onclick="updateQty(1)" class="w-14 h-14 bg-slate-50 rounded-full font-bold text-2xl border border-slate-100">+</button>
            </div>
            <div class="bg-indigo-50 rounded-[2rem] p-6 mb-8 text-center border border-indigo-100">
                <p id="confirm-total" class="text-4xl font-black text-indigo-600">$0</p>
            </div>
            <div class="grid gap-3">
                <button onclick="confirmSale('cash')" class="w-full py-5 bg-[#10b981] text-white font-black rounded-2xl uppercase text-xs">Efectivo</button>
                <button onclick="confirmSale('mp')" class="w-full py-5 bg-[#0ea5e9] text-white font-black rounded-2xl uppercase text-xs">Mercado Pago</button>
                <button onclick="closeModal('confirm-modal')" class="py-2 text-slate-400 font-bold text-[10px] uppercase">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: HISTORIAL CON ZONA DE PELIGRO -->
    <div id="history-modal" class="hidden fixed inset-0 bg-white z-[200] p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400">📂 Historial de Cierres</h2><button onclick="closeModal('history-modal')" class="text-2xl">✕</button></div>
            
            <div id="history-list" class="space-y-4 mb-10"></div>

            <div class="mt-20 p-8 bg-red-50 rounded-[3rem] border border-red-100 space-y-4">
                <p class="text-[9px] font-black text-red-400 uppercase tracking-widest text-center mb-2">Zona de Peligro</p>
                <button onclick="resetCurrentDay()" class="w-full py-4 bg-white text-red-600 border border-red-200 font-black rounded-2xl uppercase text-[10px]">Restablecer Ventas de Hoy</button>
                <button onclick="resetFullHistory()" class="w-full py-4 bg-red-600 text-white font-black rounded-2xl uppercase text-[10px] shadow-lg shadow-red-100">Borrar todo el Historial</button>
            </div>
        </div>
    </div>

    <!-- MODAL: STOCK, NOTAS Y REPORTE (Otros modales necesarios) -->
    <div id="config-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto"><div class="max-w-md mx-auto"><div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-slate-400">📦 Gestión Stock</h2><button onclick="closeModal('config-modal')" class="text-2xl">✕</button></div><div class="bg-slate-50 p-6 rounded-[2rem] mb-8 border border-slate-100"><input id="in-name" type="text" placeholder="Nombre" class="w-full p-4 rounded-xl mb-3 font-bold text-sm bg-white outline-none"><input id="in-price" type="number" placeholder="Precio ($)" class="w-full p-4 rounded-xl mb-6 font-bold text-sm bg-white outline-none"><button onclick="saveProduct()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl uppercase text-xs">Añadir Producto</button></div><div id="edit-list" class="space-y-1"></div></div></div>
    <div id="notes-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto"><div class="max-w-md mx-auto"><div class="flex justify-between items-center mb-8"><h2 class="font-black uppercase text-[10px] tracking-widest text-orange-400">📝 Notas</h2><button onclick="closeModal('notes-modal')" class="text-2xl">✕</button></div><textarea id="notes-area" oninput="saveNotes()" class="w-full h-[60vh] p-8 bg-orange-50 rounded-[3rem] font-bold text-slate-700 outline-none border-none resize-none placeholder-orange-200" placeholder="Anota algo..."></textarea></div></div>
    <div id="report-modal" class="hidden fixed inset-0 bg-white z-[250] p-6 overflow-y-auto"><div class="max-w-md mx-auto"><div class="flex justify-between mb-8 no-print items-center"><button onclick="closeModal('report-modal')" class="font-black text-slate-400 text-[10px] uppercase">✕ Cerrar</button><button onclick="window.print()" class="bg-slate-900 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">Imprimir</button></div><div id="report-content"></div></div></div>

    <script>
        let currentBooth = 'estilo'; // estilo o oki
        let pendingItem = null;
        let currentQty = 1;

        const getSafe = (k) => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch(e) { return []; } };

        function switchBooth(b) {
            currentBooth = b;
            document.getElementById('tab-estilo').className = b === 'estilo' ? 'flex-1 py-4 text-[10px] uppercase active-tab-estilo tracking-tight' : 'flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight';
            document.getElementById('tab-oki').className = b === 'oki' ? 'flex-1 py-4 text-[10px] uppercase active-tab-oki tracking-tight' : 'flex-1 py-4 text-[10px] uppercase text-slate-400 tracking-tight';
            render();
        }

        function render() {
            // Calcular totales combinando ambos puestos pero restando sus respectivos gastos
            let cash = 0, mp = 0;
            ['estilo', 'oki'].forEach(p => {
                getSafe(p + '_sales').forEach(s => {
                    if(s.method === 'cash') cash += s.totalPrice;
                    else mp += s.totalPrice;
                });
                getSafe(p + '_expenses').forEach(e => {
                    if(e.method === 'cash') cash -= e.amount;
                    else mp -= e.amount;
                });
            });

            document.getElementById('total-cash').innerText = "$" + cash.toLocaleString();
            document.getElementById('total-mp').innerText = "$" + mp.toLocaleString();

            const search = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('products-grid').innerHTML = getSafe(currentBooth + '_products')
                .filter(p => p.name.toLowerCase().includes(search))
                .map(p => `
                    <button onclick="askConfirmation(${p.id})" class="product-card">
                        <h4 class="font-black text-[10px] uppercase text-slate-700 leading-tight">${p.name}</h4>
                        <p class="text-[#4f46e5] font-black text-sm">$${p.price.toLocaleString()}</p>
                    </button>
                `).join('');
        }

        function askConfirmation(id) {
            pendingItem = getSafe(currentBooth + '_products').find(p => p.id === id);
            currentQty = 1; updateQtyDisplay();
            document.getElementById('confirm-item-name').innerText = pendingItem.name;
            document.getElementById('confirm-modal').classList.remove('hidden');
        }
        function updateQty(v) { currentQty = Math.max(1, currentQty + v); updateQtyDisplay(); }
        function updateQtyDisplay() {
            document.getElementById('confirm-qty').innerText = currentQty;
            document.getElementById('confirm-total').innerText = "$" + (pendingItem.price * currentQty).toLocaleString();
        }
        function confirmSale(method) {
            const sales = getSafe(currentBooth + '_sales');
            sales.push({ id: Date.now(), name: pendingItem.name, qty: currentQty, totalPrice: pendingItem.price * currentQty, method, hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            localStorage.setItem(currentBooth + '_sales', JSON.stringify(sales));
            closeModal('confirm-modal'); render();
        }

        // Gastos por puesto
        function openExpenses() {
            const label = currentBooth === 'estilo' ? 'A TU ESTILO' : 'OKIEDOKIE';
            document.getElementById('expense-booth-label').innerText = "Cargando a: " + label;
            document.getElementById('expenses-modal').classList.remove('hidden');
            renderExp();
        }
        function saveExpense(method) {
            const n = document.getElementById('exp-name').value, p = parseInt(document.getElementById('exp-price').value);
            if(!n || !p) return;
            const exps = getSafe(currentBooth + '_expenses');
            exps.push({ id: Date.now(), name: n, amount: p, method });
            localStorage.setItem(currentBooth + '_expenses', JSON.stringify(exps));
            document.getElementById('exp-name').value = ""; document.getElementById('exp-price').value = "";
            renderExp(); render();
        }
        function renderExp() {
            const currentExps = getSafe(currentBooth + '_expenses');
            document.getElementById('expenses-list').innerHTML = currentExps.map(e => `
                <div class="flex justify-between p-4 bg-red-50 rounded-2xl text-[10px] font-bold text-red-800 uppercase">
                    <span>${e.name} (${e.method === 'cash' ? 'Efectivo' : 'M. Pago'})</span><span>-$${e.amount}</span>
                </div>
            `).join('') || '<p class="text-center text-[10px] text-slate-300 font-bold uppercase mt-4">Sin gastos en este puesto</p>';
        }

        // --- SISTEMA DE REINICIO ---
        function resetCurrentDay() {
            if(confirm("¿Seguro quieres borrar los datos de hoy? Se borrarán ventas y gastos de ambos puestos.")) {
                ['estilo', 'oki'].forEach(p => {
                    localStorage.setItem(p + '_sales', '[]');
                    localStorage.setItem(p + '_expenses', '[]');
                });
                localStorage.setItem('feria_notes', "");
                render(); alert("Día restablecido.");
            }
        }
        function resetFullHistory() {
            if(confirm("¡ATENCIÓN! Esto borrará permanentemente todo el historial de cierres acumulados.")) {
                localStorage.setItem('feria_history', '[]');
                openHistory(); alert("Historial borrado.");
            }
        }

        // --- CIERRE Y HISTORIAL ---
        function handleCloseDay() {
            const sE = getSafe('estilo_sales'), sO = getSafe('oki_sales');
            const gE = getSafe('estilo_expenses'), gO = getSafe('oki_expenses');
            
            if (sE.length === 0 && sO.length === 0 && gE.length === 0 && gO.length === 0) return alert("Nada para cerrar.");

            if (confirm("¿Confirmar cierre de caja y guardar en historial?")) {
                const now = new Date();
                const closure = {
                    id: Date.now(),
                    fecha: now.toLocaleDateString(),
                    hora: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                    estilo: sE, oki: sO,
                    estiloExps: gE, okiExps: gO,
                    totalCash: document.getElementById('total-cash').innerText,
                    totalMp: document.getElementById('total-mp').innerText
                };

                const history = getSafe('feria_history');
                history.unshift(closure);
                localStorage.setItem('feria_history', JSON.stringify(history));

                // Limpiar todo lo del día
                ['estilo', 'oki'].forEach(p => {
                    localStorage.setItem(p + '_sales', '[]');
                    localStorage.setItem(p + '_expenses', '[]');
                });
                localStorage.setItem('feria_notes', "");
                render(); alert("¡Día cerrado con éxito!");
            }
        }

        function openHistory() {
            const history = getSafe('feria_history');
            document.getElementById('history-list').innerHTML = history.map(h => {
                // Lógica de títulos según capturas
                let label = "CIERRE MIXTO";
                let color = "border-slate-300";
                const hasEstilo = h.estilo.length > 0 || h.estiloExps.length > 0;
                const hasOki = h.oki.length > 0 || h.okiExps.length > 0;

                if (hasEstilo && !hasOki) { label = "CIERRE: A TU ESTILO ✨"; color = "border-pink-400"; }
                else if (hasOki && !hasEstilo) { label = "CIERRE: OKIDOKIE 🤖"; color = "border-indigo-400"; }

                return `
                <div class="history-card ${color}">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] font-black text-slate-800 uppercase tracking-tight">${label}</p>
                            <p class="text-[9px] font-bold text-slate-400 mt-1">${h.fecha} — ${h.hora}</p>
                        </div>
                        <button onclick='viewHistoryDetail(${JSON.stringify(h)})' class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[9px] font-black uppercase shadow-lg shadow-slate-200">Detalle</button>
                    </div>
                    <div class="flex gap-4 mt-4 border-t pt-3 border-slate-50">
                        <span class="text-[11px] font-black text-emerald-500">${h.totalCash}</span>
                        <span class="text-[11px] font-black text-sky-500">${h.totalMp}</span>
                    </div>
                </div>
                `;
            }).join('') || '<p class="text-center py-20 text-slate-300 font-black uppercase text-[10px]">Historial vacío</p>';
            document.getElementById('history-modal').classList.remove('hidden');
        }

        function viewHistoryDetail(h) {
            let html = `
                <div class="text-center mb-8"><h2 class="font-black text-xl uppercase tracking-tighter">${h.fecha}</h2><p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Cierre: ${h.hora}</p></div>
                <div class="space-y-6">
                    <div>
                        <p class="text-[9px] font-black text-pink-500 border-b pb-1 mb-2 uppercase">✨ A TU ESTILO</p>
                        ${h.estilo.map(s => `<div class="flex justify-between text-[11px] py-1"><span>${s.name} x${s.qty}</span><span class="font-black">$${s.totalPrice}</span></div>`).join('') || '<p class="text-[10px] text-slate-300">Sin ventas</p>'}
                        ${h.estiloExps?.map(e => `<div class="flex justify-between text-[10px] py-1 text-red-400 italic"><span>Gasto: ${e.name}</span><span class="font-bold">-$${e.amount}</span></div>`).join('') || ''}
                    </div>
                    <div>
                        <p class="text-[9px] font-black text-indigo-500 border-b pb-1 mb-2 uppercase">🤖 OKIDOKIE</p>
                        ${h.oki.map(s => `<div class="flex justify-between text-[11px] py-1"><span>${s.name} x${s.qty}</span><span class="font-black">$${s.totalPrice}</span></div>`).join('') || '<p class="text-[10px] text-slate-300">Sin ventas</p>'}
                        ${h.okiExps?.map(e => `<div class="flex justify-between text-[10px] py-1 text-red-400 italic"><span>Gasto: ${e.name}</span><span class="font-bold">-$${e.amount}</span></div>`).join('') || ''}
                    </div>
                </div>
                <div class="mt-8 p-7 bg-slate-900 rounded-[2.5rem] text-white text-[12px] font-black uppercase shadow-2xl">
                    <p class="flex justify-between mb-2"><span>Efectivo:</span> <span class="text-emerald-400">${h.totalCash}</span></p>
                    <p class="flex justify-between"><span>M. Pago:</span> <span class="text-sky-400">${h.totalMp}</span></p>
                </div>
            `;
            document.getElementById('report-content').innerHTML = html;
            document.getElementById('report-modal').classList.remove('hidden');
        }

        function generateReport() {
            const h = { 
                fecha: "Hoy", hora: "Cierre: Actual", 
                estilo: getSafe('estilo_sales'), oki: getSafe('oki_sales'), 
                estiloExps: getSafe('estilo_expenses'), okiExps: getSafe('oki_expenses'),
                totalCash: document.getElementById('total-cash').innerText, 
                totalMp: document.getElementById('total-mp').innerText 
            };
            viewHistoryDetail(h);
        }

        // Auxiliares
        function openConfig() { document.getElementById('config-modal').classList.remove('hidden'); renderEditList(); }
        function saveProduct() {
            const n = document.getElementById('in-name').value, p = parseInt(document.getElementById('in-price').value);
            if(!n || !p) return;
            const items = getSafe(currentBooth + '_products');
            items.push({ id: Date.now(), name: n, price: p });
            localStorage.setItem(currentBooth + '_products', JSON.stringify(items));
            document.getElementById('in-name').value = ""; document.getElementById('in-price').value = "";
            renderEditList(); render();
        }
        function renderEditList() {
            document.getElementById('edit-list').innerHTML = getSafe(currentBooth + '_products').map(p => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl mb-2 border border-slate-100">
                    <div class="text-[10px] font-black uppercase"><p>${p.name}</p><p class="text-indigo-500">$${p.price}</p></div>
                    <button onclick="deleteProduct(${p.id})" class="text-red-400 font-black text-[9px] bg-red-50 px-3 py-2 rounded-xl">Eliminar</button>
                </div>
            `).join('');
        }
        function deleteProduct(id) {
            const items = getSafe(currentBooth + '_products').filter(i => i.id !== id);
            localStorage.setItem(currentBooth + '_products', JSON.stringify(items));
            renderEditList(); render();
        }
        function openNotes() { document.getElementById('notes-area').value = localStorage.getItem('feria_notes') || ""; document.getElementById('notes-modal').classList.remove('hidden'); }
        function saveNotes() { localStorage.setItem('feria_notes', document.getElementById('notes-area').value); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = render;
    </script>
</body>
</html>

```
